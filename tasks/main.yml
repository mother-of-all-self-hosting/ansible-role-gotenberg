---
- name: Perform Gotenberg installation tasks
  when: gotenberg_enabled | bool
  tags:
    - setup-all
    - setup-gotenberg
    - install-all
    - install-gotenberg
  block:
    - name: Validate Gotenberg configuration
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/validate_config.yml"
    - name: Install Gotenberg
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/install.yml"

- name: Perform Gotenberg uninstallation tasks
  when: not gotenberg_enabled | bool
  tags:
    - setup-all
    - setup-gotenberg
  block:
    - name: Uninstall Gotenberg
      ansible.builtin.include_tasks: "{{ role_path }}/tasks/uninstall.yml"
