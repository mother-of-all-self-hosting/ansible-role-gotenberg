---
- name: Check existence of Gotenberg systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ gotenberg_identifier }}.service"
  register: gotenberg_service_stat

- name: Uninstall Gotenberg systemd services and files
  when: gotenberg_service_stat.stat.exists | bool
  block:
    - name: Ensure Gotenberg systemd service is stopped
      ansible.builtin.service:
        name: "{{ gotenberg_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Gotenberg systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ gotenberg_identifier }}.service"
        state: absent

    - name: Ensure Gotenberg support files do not exist
      ansible.builtin.file:
        path: "{{ gotenberg_base_path }}/{{ item }}"
        state: absent
      with_items:
        - env
        - labels

    - name: Ensure Gotenberg local data path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ gotenberg_data_path }}"
      register: gotenberg_data_path_deletion_result
      changed_when: gotenberg_data_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Gotenberg base path does not exist if empty
      ansible.builtin.command:
        cmd: "rmdir {{ gotenberg_base_path }}"
      register: gotenberg_base_path_deletion_result
      changed_when: gotenberg_base_path_deletion_result.rc == 0
      failed_when: false

    - name: Ensure Gotenberg container network does not exist
      when: gotenberg_container_network_deletion_enabled
      block:
        - name: Ensure Gotenberg container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ gotenberg_container_network }}"
            state: absent
          register: gotenberg_network_deletion_result

        - name: Ensure Gotenberg container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ gotenberg_container_network }}
          register: gotenberg_network_deletion_result
          changed_when: gotenberg_container_network in gotenberg_network_deletion_result.stdout

- name: Check existence of Gotenberg local data path
  ansible.builtin.stat:
    path: "{{ gotenberg_data_path }}"
  register: gotenberg_data_path_stat

# We just want to notify the user. Deleting data is too destructive.
- name: Inject the message about the remaining Apache Tika Server local data path
  when: gotenberg_data_path_stat.stat.exists | bool
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Note: As the local Gotenberg instance has been removed, some old data remains in `" + gotenberg_data_path + "`. Feel free to delete it."
        ]
      }}
