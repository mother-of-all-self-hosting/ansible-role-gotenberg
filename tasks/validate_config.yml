---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "gotenberg_container_image_force_pull", "new": "<removed> (the new community.docker.docker_image_pull module handles this natively)" }

- name: Fail if required Gotenberg settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - gotenberg_uid
    - gotenberg_gid
    - gotenberg_container_network

- name: Run if Traefik is enabled
  when: gotenberg_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Gotenberg are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - gotenberg_container_labels_traefik_hostname
        - gotenberg_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `gotenberg_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if gotenberg_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          gotenberg_container_labels_traefik_path_prefix (`{{ gotenberg_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/gotenberg`).
      when: "gotenberg_container_labels_traefik_path_prefix != '/' and gotenberg_container_labels_traefik_path_prefix[-1] == '/'"
