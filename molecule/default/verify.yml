---
- name: Verify Gotenberg systemd service
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Wait for Gotenberg service to become active (up to 180s)
      ansible.builtin.systemd:
        name: gotenberg.service
      register: gotenberg_service
      until: gotenberg_service.status.ActiveState == 'active'
      retries: 36
      delay: 5

    - name: Assert Gotenberg service is active
      ansible.builtin.assert:
        that: gotenberg_service.status.ActiveState == 'active'
        fail_msg: "gotenberg.service not active ({{ gotenberg_service.status.ActiveState }})"
        success_msg: "gotenberg.service is active"

    - name: Retrieve Gotenberg service log for debugging
      when: gotenberg_debug_service_enabled | bool
      ansible.builtin.command:
        cmd: journalctl -xeu gotenberg.service
      changed_when: false

    - name: Wait for Gotenberg HTTP endpoint to respond (up to 10m)
      ansible.builtin.uri:
        url: "http://localhost:3000/health"  # cf. https://gotenberg.dev/docs/system/head-health-check
        method: GET
        status_code: [200, 302]
        follow_redirects: none
      register: gotenberg_endpoint
      until: gotenberg_endpoint.status in [200, 302]
      retries: 120
      delay: 5

    - name: Assert Gotenberg HTTP endpoint responds
      ansible.builtin.assert:
        that: gotenberg_endpoint.status in [200, 302]
        fail_msg: "Gotenberg did not respond as expected ({{ gotenberg_endpoint.status | default('no response') }})"
        success_msg: "Gotenberg responded with {{ gotenberg_endpoint.status }}"

    - name: Show Gotenberg systemd service status summary
      ansible.builtin.debug:
        msg:
          - "Gotenberg systemd: {{ gotenberg_service.status.ActiveState }}"
          - "Gotenberg HTTP: {{ gotenberg_endpoint.status }}"
