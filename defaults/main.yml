---
# Project source code URL: https://github.com/gotenberg/gotenberg

gotenberg_enabled: true

gotenberg_identifier: gotenberg
gotenberg_base_path: "/{{ gotenberg_identifier }}"

# renovate: datasource=docker depName=gotenberg/gotenberg versioning=semver
gotenberg_version: 8.32.0

gotenberg_uid: ""
gotenberg_gid: ""

# The scheme used for serving Gotenberg.
gotenberg_scheme: https

# The hostname at which Gotenberg is served.
gotenberg_hostname: ""

# The path at which Gotenberg is served.
# This value must either be `/` or not end with a slash (e.g. `/gotenberg`).
gotenberg_path_prefix: /

gotenberg_container_image: "{{ gotenberg_container_image_registry_prefix }}gotenberg/gotenberg:{{ gotenberg_container_image_tag }}"
gotenberg_container_image_tag: "{{ gotenberg_version }}"
gotenberg_container_image_registry_prefix: "{{ gotenberg_container_image_registry_prefix_upstream }}"
gotenberg_container_image_registry_prefix_upstream: "{{ gotenberg_container_image_registry_prefix_upstream_default }}"
gotenberg_container_image_registry_prefix_upstream_default: docker.io/
# TODO: add tasks to self-build the image

# The base container network. It will be auto-created by this role if it doesn't exist already.
gotenberg_container_network: "{{ gotenberg_identifier }}"

# Control if the container network is deleted on uninstalling.
gotenberg_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `gotenberg_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
gotenberg_container_http_host_bind_port: ""

# The port number in the container
gotenberg_container_http_port: 3000

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to a reverse proxy, which runs in a different container network.
gotenberg_container_additional_networks: "{{ gotenberg_container_additional_networks_auto + gotenberg_container_additional_networks_custom }}"
gotenberg_container_additional_networks_auto: []
gotenberg_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
gotenberg_container_additional_volumes: "{{ gotenberg_container_additional_volumes_auto + gotenberg_container_additional_volumes_custom }}"
gotenberg_container_additional_volumes_auto: []
gotenberg_container_additional_volumes_custom: []

# gotenberg_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `gotenberg_container_labels_additional_labels_custom`.
gotenberg_container_labels_traefik_enabled: false
gotenberg_container_labels_traefik_docker_network: "{{ gotenberg_container_network }}"
gotenberg_container_labels_traefik_hostname: "{{ gotenberg_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/gotenberg`).
gotenberg_container_labels_traefik_path_prefix: "{{ gotenberg_path_prefix }}"
gotenberg_container_labels_traefik_rule: "Host(`{{ gotenberg_container_labels_traefik_hostname }}`){% if gotenberg_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ gotenberg_container_labels_traefik_path_prefix }}`){% endif %}"
gotenberg_container_labels_traefik_priority: 0
gotenberg_container_labels_traefik_entrypoints: web-secure
gotenberg_container_labels_traefik_tls: "{{ gotenberg_container_labels_traefik_entrypoints != 'web' }}"
gotenberg_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `gotenberg_container_labels_traefik_additional_request_headers_custom`
gotenberg_container_labels_traefik_additional_request_headers: "{{ gotenberg_container_labels_traefik_additional_request_headers_auto | combine(gotenberg_container_labels_traefik_additional_request_headers_custom) }}"
gotenberg_container_labels_traefik_additional_request_headers_auto: {}
gotenberg_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `gotenberg_container_labels_traefik_additional_response_headers_custom`
gotenberg_container_labels_traefik_additional_response_headers: "{{ gotenberg_container_labels_traefik_additional_response_headers_auto | combine(gotenberg_container_labels_traefik_additional_response_headers_custom) }}"
gotenberg_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': gotenberg_http_header_xss_protection} if gotenberg_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': gotenberg_http_header_content_type_options} if gotenberg_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': gotenberg_http_header_content_security_policy} if gotenberg_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': gotenberg_http_header_permissions_policy} if gotenberg_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': gotenberg_http_header_strict_transport_security} if gotenberg_http_header_strict_transport_security and gotenberg_container_labels_traefik_tls else {})
  }}
gotenberg_container_labels_traefik_additional_response_headers_custom: {}

# gotenberg_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `gotenberg_container_labels_additional_labels_custom`
#
# Example:
# gotenberg_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
gotenberg_container_labels_additional_labels: "{{ gotenberg_container_labels_additional_labels_auto + gotenberg_container_labels_additional_labels_custom }}"
gotenberg_container_labels_additional_labels_auto: []
gotenberg_container_labels_additional_labels_custom: []

# Specify the size of the container's tmpfs volume
gotenberg_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
gotenberg_container_extra_arguments: "{{ gotenberg_container_extra_arguments_auto + gotenberg_container_extra_arguments_custom }}"
gotenberg_container_extra_arguments_auto: []
gotenberg_container_extra_arguments_custom: []

# A list of extra arguments to pass to the Gotenberg process
# Example: ['--SOME_ARGUMENT']
gotenberg_process_extra_arguments: "{{ gotenberg_process_extra_arguments_auto + gotenberg_process_extra_arguments_custom }}"
gotenberg_process_extra_arguments_auto: []
gotenberg_process_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
gotenberg_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
gotenberg_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
gotenberg_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
gotenberg_http_header_permissions_policy: "{{ 'interest-cohort=()' if gotenberg_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
gotenberg_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if gotenberg_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `gotenberg_http_header_permissions_policy`
gotenberg_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `gotenberg_http_header_strict_transport_security`
gotenberg_hsts_preload_enabled: false

# List of systemd services that the Gotenberg systemd service depends on
gotenberg_systemd_required_services_list: "{{ gotenberg_systemd_required_services_list_default + gotenberg_systemd_required_services_list_auto + gotenberg_systemd_required_services_list_custom }}"
gotenberg_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
gotenberg_systemd_required_services_list_auto: []
gotenberg_systemd_required_services_list_custom: []

# List of systemd services that the Gotenberg systemd service wants
gotenberg_systemd_wanted_services_list: "{{ gotenberg_systemd_wanted_services_list_default + gotenberg_systemd_wanted_services_list_auto + gotenberg_systemd_wanted_services_list_custom }}"
gotenberg_systemd_wanted_services_list_default: []
gotenberg_systemd_wanted_services_list_auto: []
gotenberg_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
gotenberg_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
gotenberg_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
gotenberg_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
gotenberg_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ gotenberg_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ gotenberg_container_stop_grace_time_seconds }} {{ gotenberg_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ gotenberg_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ gotenberg_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ gotenberg_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ gotenberg_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ gotenberg_identifier }} after {{ gotenberg_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
gotenberg_environment_variables_tz: UTC

# Additional environment variables.
gotenberg_environment_variables_additional_variables: ""

# gotenberg_restart_necessary controls whether the Gotenberg systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
gotenberg_restart_necessary: false
