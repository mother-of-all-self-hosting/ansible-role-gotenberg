---
# Project source code URL: https://github.com/apache/tika-docker

tika_enabled: true

tika_identifier: tika
tika_base_path: "/{{ tika_identifier }}"
tika_data_path: "{{ tika_base_path }}/data"

tika_version: 3.3.0.0

tika_uid: ""
tika_gid: ""

# The scheme used for serving Apache Tika Server.
tika_scheme: https

# The hostname at which Apache Tika Server is served.
tika_hostname: ""

# The path at which Apache Tika Server is served.
# This value must either be `/` or not end with a slash (e.g. `/tika`).
tika_path_prefix: /

tika_container_image: "{{ tika_container_image_registry_prefix }}apache/tika:{{ tika_container_image_tag }}"
tika_container_image_tag: "{{ tika_version }}-full"
tika_container_image_registry_prefix: "{{ tika_container_image_registry_prefix_upstream }}"
tika_container_image_registry_prefix_upstream: "{{ tika_container_image_registry_prefix_upstream_default }}"
tika_container_image_registry_prefix_upstream_default: docker.io/
tika_container_image_force_pull: "{{ tika_container_image.endswith(':latest') }}"
# TODO: add tasks to self-build the image

# The base container network. It will be auto-created by this role if it doesn't exist already.
tika_container_network: "{{ tika_identifier }}"

# Control if the container network is deleted on uninstalling.
tika_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `tika_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
tika_container_http_host_bind_port: ""

# The port number in the container
tika_container_http_port: 9998

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to a reverse proxy, which runs in a different container network.
tika_container_additional_networks: "{{ tika_container_additional_networks_auto + tika_container_additional_networks_custom }}"
tika_container_additional_networks_auto: []
tika_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
tika_container_additional_volumes: "{{ tika_container_additional_volumes_auto + tika_container_additional_volumes_custom }}"
tika_container_additional_volumes_auto: []
tika_container_additional_volumes_custom: []

# tika_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `tika_container_labels_additional_labels_custom`.
tika_container_labels_traefik_enabled: false
tika_container_labels_traefik_docker_network: "{{ tika_container_network }}"
tika_container_labels_traefik_hostname: "{{ tika_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/tika`).
tika_container_labels_traefik_path_prefix: "{{ tika_path_prefix }}"
tika_container_labels_traefik_rule: "Host(`{{ tika_container_labels_traefik_hostname }}`){% if tika_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ tika_container_labels_traefik_path_prefix }}`){% endif %}"
tika_container_labels_traefik_priority: 0
tika_container_labels_traefik_entrypoints: web-secure
tika_container_labels_traefik_tls: "{{ tika_container_labels_traefik_entrypoints != 'web' }}"
tika_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `tika_container_labels_traefik_additional_request_headers_custom`
tika_container_labels_traefik_additional_request_headers: "{{ tika_container_labels_traefik_additional_request_headers_auto | combine(tika_container_labels_traefik_additional_request_headers_custom) }}"
tika_container_labels_traefik_additional_request_headers_auto: {}
tika_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `tika_container_labels_traefik_additional_response_headers_custom`
tika_container_labels_traefik_additional_response_headers: "{{ tika_container_labels_traefik_additional_response_headers_auto | combine(tika_container_labels_traefik_additional_response_headers_custom) }}"
tika_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': tika_http_header_xss_protection} if tika_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': tika_http_header_content_type_options} if tika_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': tika_http_header_content_security_policy} if tika_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': tika_http_header_permissions_policy} if tika_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': tika_http_header_strict_transport_security} if tika_http_header_strict_transport_security and tika_container_labels_traefik_tls else {})
  }}
tika_container_labels_traefik_additional_response_headers_custom: {}

# tika_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `tika_container_labels_additional_labels_custom`
#
# Example:
# tika_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
tika_container_labels_additional_labels: "{{ tika_container_labels_additional_labels_auto + tika_container_labels_additional_labels_custom }}"
tika_container_labels_additional_labels_auto: []
tika_container_labels_additional_labels_custom: []

# Specify the size of the container's tmpfs volume
tika_container_tmpfs_tmp_size: 128m

# A list of extra arguments to pass to the container (`docker create` command)
tika_container_extra_arguments: "{{ tika_container_extra_arguments_auto + tika_container_extra_arguments_custom }}"
tika_container_extra_arguments_auto: []
tika_container_extra_arguments_custom: []

# A list of extra arguments to pass to the Apache Tika Server process
# Example: ['--SOME_ARGUMENT']
tika_process_extra_arguments: "{{ tika_process_extra_arguments_auto + tika_process_extra_arguments_custom }}"
tika_process_extra_arguments_auto: []
tika_process_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
tika_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
tika_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
tika_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
tika_http_header_permissions_policy: "{{ 'interest-cohort=()' if tika_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
tika_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if tika_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `tika_http_header_permissions_policy`
tika_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `tika_http_header_strict_transport_security`
tika_hsts_preload_enabled: false

# List of systemd services that the Apache Tika Server systemd service depends on
tika_systemd_required_services_list: "{{ tika_systemd_required_services_list_default + tika_systemd_required_services_list_auto + tika_systemd_required_services_list_custom }}"
tika_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
tika_systemd_required_services_list_auto: []
tika_systemd_required_services_list_custom: []

# List of systemd services that the Apache Tika Server systemd service wants
tika_systemd_wanted_services_list: "{{ tika_systemd_wanted_services_list_default + tika_systemd_wanted_services_list_auto + tika_systemd_wanted_services_list_custom }}"
tika_systemd_wanted_services_list_default: []
tika_systemd_wanted_services_list_auto: []
tika_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
tika_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
tika_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
tika_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
tika_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ tika_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ tika_container_stop_grace_time_seconds }} {{ tika_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ tika_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ tika_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ tika_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ tika_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ tika_identifier }} after {{ tika_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone
tika_environment_variables_tz: UTC

# Additional environment variables.
tika_environment_variables_additional_variables: ""

# tika_restart_necessary controls whether the Apache Tika Server systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
tika_restart_necessary: false
